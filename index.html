<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goudey Tradition Card Museum</title>
  <meta name="description" content="Beckett-style card museum with click-based value tracking." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Goudey Tradition Card Museum</h1>
    <p>Professional high-end showcase · Click cards to increase value</p>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-head">
        <h2>Collection</h2>
        <div class="controls">
          <label for="sportFilter">Sport</label>
          <select id="sportFilter">
            <option value="all">All</option>
            <option value="Baseball">Baseball</option>
            <option value="Football">Football</option>
            <option value="Basketball">Basketball</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div id="cards" class="card-grid"></div>
    </section>

    <aside class="panel side">
      <h2>Market Summary</h2>
      <dl class="stats">
        <div><dt>Total Cards</dt><dd id="statCards">0</dd></div>
        <div><dt>Total Clicks</dt><dd id="statClicks">0</dd></div>
        <div><dt>Portfolio Value</dt><dd id="statValue">$0</dd></div>
      </dl>
      <p class="note">
        No uploads. No account saving. Values are tracked by clicks for this page session.
      </p>
    </aside>
  </main>

  <template id="cardTemplate">
    <article class="card" role="button" tabindex="0" aria-label="Trading card">
      <div class="card-chrome">
        <img class="card-img" src="" alt="" />
        <div class="card-foot">
          <span class="badge"></span>
          <span class="player"></span>
        </div>
        <div class="table">
          <div><span>Base Value</span><strong class="base"></strong></div>
          <div><span>Clicks</span><strong class="clicks"></strong></div>
          <div><span>Current Value</span><strong class="value"></strong></div>
        </div>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
